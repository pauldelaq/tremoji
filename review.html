<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Tr.emoji">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="white">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <title>Tr.emoji</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/review.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <header>
        <h1 id="header-title">Tr.emoji</h1>
        <div class="menu">
            <div class="top-buttons">
                <div class="dropdown">
                        <button class="dropbtn" id="soundToggleBtn" data-target="soundDropdown">
                            <img src="assets/svg/1F50A.svg" alt="Language Dropdown" width="38" height="38">
                        </button>
                        <div id="soundDropdown" class="dropdown-content">
                            <!-- TTS Settings Heading -->
                            <div class="setting-category">
                                <p id="ttsSettingsLabel">TTS Settings</p>
                                <hr> <!-- Separator line -->
                            </div>
                            <div class="setting-item volume-level-item">
                                <label id="volumeLevelLabel">Volume</label>
                                <div class="volume-slider-container">
                                    <img src="assets/svg/1F508.svg" alt="Quiet Speaker" width="24" height="24" class="speaker-icon left" id="volumeMinIcon">
                                    <input type="range" id="volumeLevelSlider" min="0" max="1" step="0.1" value="1">
                                    <img src="assets/svg/1F50A.svg" alt="Loud Speaker" width="24" height="24" class="speaker-icon right" id="volumeMaxIcon">
                                </div>
                            </div>
                            <div class="setting-item tts-speed-item">
                                <label id="TTSSpeedLabel">TTS Speed</label>
                                <div class="speed-slider-container">
                                    <span class="speed-text">0.5x</span>
                                    <input type="range" id="TTSSpeedSlider" min="0.5" max="1.0" step="0.1" value="1.0"> <!-- Slider -->
                                    <span class="speed-text">1.0x</span>
                                </div>
                            </div>
                            <hr>
                            <div class="setting-category">
                                <p id="ttsVoicesLabel">TTS Voices</p>
                                <hr>
                                <div id="voiceOptions"></div> <!-- Container for voice list -->
                            </div>
                        </div>
                </div>
                <button class="dropbtn" id="settingsToggleBtn">
                    <img src="assets/svg/2699.svg" alt="Settings" width="38" height="38">
                </button>
                <div id="settingsDropdown" class="dropdown-content">
                    <div class="setting-item">
                        <label class="switch">
                            <input type="checkbox" id="svgSwitch">
                            <span class="slider round"></span>
                        </label>
                        <span id="showSvgLabel">Show SVG</span>
                    </div>
                </div>
            </div>
        </div>
    </header>
    <main id="review-app" class="container review-game-match review-state-category">
        <section id="category-selection-view" class="categories">
            <div class="boxed">
                <h2 id="game-mode-header" class="mode-header">Game Mode</h2>
                <h2 id="select-category">Select a Category to Practice:</h2>
            </div>
            <ul id="category-list">
                <!-- Review categories will be injected here -->
            </ul>
        </section>

        <section id="gameplay-view" class="hidden">
            <section id="match-game-view" class="game-view hidden">
                <!-- Emoji Match game UI will be injected here -->
            </section>

            <section id="guess-word-game-view" class="game-view hidden">
                <!-- Guess the Word game UI will be injected here -->
            </section>

            <section id="say-word-game-view" class="game-view hidden">
                <!-- Guess the Word game UI will be injected here -->
            </section>

            <div id="reviewPage" style="display: none;">
                <div class="review-container">
                    <div class="completion-text" id="completionMessage"></div>
                    <div class="reviewemoji">👍</div>

                    <div class="button-container">
                        <button id="restartBtn" class="restart-btn">
                            <img src="assets/svg/1F501.svg" alt="Restart" width="35" height="35">
                        </button>

                        <button id="homeBtn" class="home-btn">
                            <img src="assets/svg/E24D.svg" alt="Home" width="40" height="40">
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>
        <script src="https://cdn.jsdelivr.net/npm/js-confetti@latest/dist/js-confetti.browser.js"></script>
        <script src="js/review.js"></script>
</body>
</html>
