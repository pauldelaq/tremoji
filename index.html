<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Tr.emoji">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="white">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <link rel="icon" type="image/png" href="./icons/favicon.ico">
    <title>Tr.emoji</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <header>
        <h1>Tr.emoji</h1>
        <div class="menu">
            <div class="top-buttons">
            <div class="dropdown">
                <button class="dropbtn" id="langToggleBtn">
                    <img src="assets/svg/1F310.svg" alt="Language Dropdown" width="38" height="38">
                </button>
                <div class="dropdown-content" id="language-dropdown">
                    <!-- Language options will be populated dynamically -->
                </div>
            </div>
            <button class="help-btn">
                <img src="assets/svg/2753b.svg" alt="Help" width="38" height="38">
            </button>
            <div class="dropdown">
                <button class="dropbtn" id="settingsToggleBtn">
                    <img src="assets/svg/2699.svg" alt="Settings" width="38" height="38">
                </button>
                <div id="settingsDropdown" class="dropdown-content">
                    <div class="setting-item">
                        <label class="switch">
                            <input type="checkbox" id="svgSwitch">
                            <span class="slider round"></span>
                        </label>
                        <span id="showSvgLabel">Show SVG</span>
                    </div>
                    <div class="setting-item difficulty-setting">
                        <div id="difficultyLabel" class="difficulty-label">Difficulty</div>
                        <div class="difficulty-options">
                            <label><input type="radio" name="difficulty" value="easy" checked> <span id="easyOption">Easy</span></label>
                            <label><input type="radio" name="difficulty" value="medium"> <span id="mediumOption">Medium</span></label>
                            <label><input type="radio" name="difficulty" value="hard"> <span id="hardOption">Hard</span></label>
                        </div>
                    </div>
                    <div class="setting-item">
                        <div class="trash-icon" onclick="openModal()">
                            <img src="assets/svg/1F5D1.svg" alt="Reset Scores" width="24" height="24">
                        </div>
                        <span id="resetScoresText">Reset Scores</span>
                    </div>
                </div>
            </div>
                </div>
            </div>
        </div>
    </header>
    <div class="container">
            <p id="welcome-text" class="boxed">Welcome to Tr.emoji! Learn vocabulary in a fun and engaging way using emojis.</p>
        <div class="special-emoji-container">
            <span id="special-emoji"></span>
        </div>
        <div class="categories">
            <div class="boxed">
                <h2 id="skit-mode-header" class="mode-header">Skit Mode</h2>
                <h2 id="select-category">Select a Category to Practice:</h2>
            </div>
            <ul id="category-list">
                <!-- Skit categories will be injected here -->
            </ul>
            <div class="boxed storygap">
                <h2 id="review-games-header" class="mode-header">Review Games</h2>
                <h2 id="select-review-game">Select a Review Game:</h2>
            </div>
            <ul id="review-game-list">
                <!-- Review games will be injected here -->
            </ul>
            <div class="boxed storygap">
                <h2 id="story-mode-header" class="mode-header">Story Mode</h2>
                <h2 id="select-story-category">Select a Category to Practice:</h2>
            </div>
            <ul id="story-list">
                <!-- Story categories will be injected here -->
            </ul>
        </div>
    </div>
    <!-- Modal Structure -->
    <div id="confirmationModal" class="modal">
        <div class="modal-content">
            <p id="modalText">This action will reset your scores.</p>
            <div class="modal-footer">
                <button id="confirmReset" class="modal-button">Confirm</button>
                <button id="cancelReset" class="modal-button">Cancel</button>
            </div>
        </div>
    </div>
        <script src="js/index.js"></script>
</body>
</html>
